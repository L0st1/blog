# 将静态站点同步到 Gitee Pages（与 Vercel 并行；Vercel 仍由仓库连接自动部署）。
#
# 一次性配置：
# 1. Gitee：新建仓库；服务 → Gitee Pages → 选择分支（与下方 GITEE_PAGES_BRANCH 一致，默认 pages）与目录 `/`；完成实名认证。
# 2. GitHub → Settings → Secrets and variables → Actions → Repository secrets：
#    - GITEE_TOKEN：Gitee 私人令牌（需具备该仓库 push 权限；创建时勾选 projects）。
#    - GITEE_REPO：仅填 owner/repo（如 rur011/blog-pages）。勿填完整 URL、勿带 .git、勿首尾空格。
#    - GITEE_GIT_USER（可选）：HTTPS 用户名 = Gitee「登录名」或「注册邮箱」（与令牌所属账号一致）。勿留空 Secret；勿填 oauth2。
#      未设置时默认用 GITEE_REPO 的 owner。若仍 403，请显式填个人主页上的用户名或邮箱。
#    - GITEE_SSH_PRIVATE_KEY（可选）：若 HTTPS 始终失败，在 Gitee 仓库部署公钥后，将私钥整段放入此 Secret，将改用 SSH 推送（更稳）。
# 3. GitHub → Settings → Secrets and variables → Actions → Repository variables（可选）：
#    - NUXT_APP_BASE_URL：仅「项目 Pages」子路径（如 https://user.gitee.io/repo/）时设为 /repo/；用户/组织主页留空或 /。
#    - GITEE_PAGES_BRANCH：推送的静态分支名，默认 pages。
# 4. 首次启用 Gitee Pages 后若未自动更新，在 Gitee 网页点一次「更新」。

name: Deploy Gitee Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: gitee-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        env:
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL || '/' }}
        run: pnpm run generate

      - name: Push static files to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_GIT_USER: ${{ secrets.GITEE_GIT_USER }}
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          GITEE_PAGES_BRANCH: ${{ vars.GITEE_PAGES_BRANCH || 'pages' }}
        run: |
          set -euo pipefail
          test -n "${GITEE_REPO}" || (echo 'Missing secret GITEE_REPO' && exit 1)

          REPO=$(echo "${GITEE_REPO}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          REPO="${REPO#https://}"
          REPO="${REPO#http://}"
          REPO="${REPO#gitee.com/}"
          REPO="${REPO%.git}"
          REPO="${REPO%/}"
          REPO="${REPO#/}"

          if [ -z "${REPO}" ] || ! echo "${REPO}" | grep -q '/'; then
            echo 'GITEE_REPO must look like owner/repo after normalization (e.g. rur011/blog-pages).'
            exit 1
          fi

          REPO_OWNER="${REPO%%/*}"
          # GitHub 若存在「空的」GITEE_GIT_USER secret，${VAR:-default} 不会回退，会得到空用户名。
          GIT_USER="${GITEE_GIT_USER:-}"
          if [ -z "${GIT_USER}" ]; then
            GIT_USER="${REPO_OWNER}"
          fi

          cd .output/public
          git init
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: deploy ${{ github.sha }}"
          git branch -M "${GITEE_PAGES_BRANCH}"

          if [ -n "${GITEE_SSH_PRIVATE_KEY:-}" ]; then
            echo 'Using SSH deploy key (GITEE_SSH_PRIVATE_KEY).'
            mkdir -p "${HOME}/.ssh"
            printf '%s\n' "${GITEE_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/gitee_deploy"
            chmod 600 "${HOME}/.ssh/gitee_deploy"
            ssh-keyscan -t rsa,ecdsa,ed25519 gitee.com >> "${HOME}/.ssh/known_hosts" 2>/dev/null || true
            export GIT_SSH_COMMAND='ssh -i ~/.ssh/gitee_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new'
            git push -f "git@gitee.com:${REPO}.git" "${GITEE_PAGES_BRANCH}"
            exit 0
          fi

          test -n "${GITEE_TOKEN}" || (echo 'Missing GITEE_TOKEN (or set GITEE_SSH_PRIVATE_KEY for SSH).' && exit 1)

          # HTTPS：用户名=登录名或邮箱，密码=私人令牌；path 与 useHttpPath 便于与 push URL 匹配。
          git config --global credential.helper store
          git config --global credential.useHttpPath true
          export GIT_USER
          export GITEE_REPO_PATH="${REPO}"
          python3 << 'PY'
          import os
          import subprocess

          u = os.environ['GIT_USER'].strip()
          p = os.environ['GITEE_TOKEN'].strip()
          repo = os.environ['GITEE_REPO_PATH'].strip()
          if not u or not p:
              raise SystemExit('GIT_USER and GITEE_TOKEN must be non-empty after strip (use Gitee login or email + private token).')
          # git help credential：path 为 URL 路径去掉前导 /（如 rur011/blog.git）
          path = f'{repo}.git' if not repo.endswith('.git') else repo
          payload = f'protocol=https\nhost=gitee.com\npath={path}\nusername={u}\npassword={p}\n'
          subprocess.run(
              ['git', 'credential', 'approve'],
              input=payload,
              text=True,
              check=True,
              env={**os.environ, 'GIT_TERMINAL_PROMPT': '0'},
          )
          PY

          echo "Pushing to gitee.com/${REPO}.git (branch ${GITEE_PAGES_BRANCH}, user ${GIT_USER})"

          git push -f "https://gitee.com/${REPO}.git" "${GITEE_PAGES_BRANCH}"
