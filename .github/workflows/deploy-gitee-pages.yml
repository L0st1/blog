# 将静态站点同步到 Gitee Pages（与 Vercel 并行；Vercel 仍由仓库连接自动部署）。
#
# 一次性配置：
# 1. Gitee：新建仓库；服务 → Gitee Pages → 选择分支（与下方 GITEE_PAGES_BRANCH 一致，默认 pages）与目录 `/`；完成实名认证。
# 2. GitHub → Settings → Secrets and variables → Actions → Repository secrets：
#    - GITEE_TOKEN：Gitee 私人令牌（需具备该仓库 push 权限；创建时勾选 projects）。
#    - GITEE_REPO：仅填 owner/repo（如 rur011/blog-pages）。勿填完整 URL、勿带 .git、勿首尾空格。
#    - GITEE_GIT_USER（可选）：HTTPS 用户名，默认 oauth2；若仍 404 可改为你的 Gitee 登录名再试。
# 3. GitHub → Settings → Secrets and variables → Actions → Repository variables（可选）：
#    - NUXT_APP_BASE_URL：仅「项目 Pages」子路径（如 https://user.gitee.io/repo/）时设为 /repo/；用户/组织主页留空或 /。
#    - GITEE_PAGES_BRANCH：推送的静态分支名，默认 pages。
# 4. 首次启用 Gitee Pages 后若未自动更新，在 Gitee 网页点一次「更新」。

name: Deploy Gitee Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: gitee-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        env:
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL || '/' }}
        run: pnpm run generate

      - name: Push static files to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_GIT_USER: ${{ secrets.GITEE_GIT_USER }}
          GITEE_PAGES_BRANCH: ${{ vars.GITEE_PAGES_BRANCH || 'pages' }}
        run: |
          set -euo pipefail
          test -n "${GITEE_TOKEN}" || (echo 'Missing secret GITEE_TOKEN' && exit 1)
          test -n "${GITEE_REPO}" || (echo 'Missing secret GITEE_REPO' && exit 1)

          REPO=$(echo "${GITEE_REPO}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          REPO="${REPO#https://}"
          REPO="${REPO#http://}"
          REPO="${REPO#gitee.com/}"
          REPO="${REPO%.git}"
          REPO="${REPO%/}"
          REPO="${REPO#/}"

          if [ -z "${REPO}" ] || ! echo "${REPO}" | grep -q '/'; then
            echo 'GITEE_REPO must look like owner/repo after normalization (e.g. rur011/blog-pages).'
            exit 1
          fi

          GIT_USER="${GITEE_GIT_USER:-oauth2}"
          # 令牌若含 @、:、% 等，拼进 https://user:pass@host 会被误解析（曾出现 host 变成 owner、DNS 报 rur011）。
          # 先启用 store，再用 git credential approve 写入凭据，最后用无账号信息的 URL 推送。
          git config --global credential.helper store
          export GIT_USER
          python3 << 'PY'
          import os
          import subprocess

          u = os.environ['GIT_USER']
          p = os.environ['GITEE_TOKEN']
          payload = f'protocol=https\nhost=gitee.com\nusername={u}\npassword={p}\n'
          subprocess.run(
              ['git', 'credential', 'approve'],
              input=payload,
              text=True,
              check=True,
              env={**os.environ, 'GIT_TERMINAL_PROMPT': '0'},
          )
          PY

          echo "Pushing to gitee.com/${REPO}.git (branch ${GITEE_PAGES_BRANCH}, user ${GIT_USER})"

          cd .output/public
          git init
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: deploy ${{ github.sha }}"
          git branch -M "${GITEE_PAGES_BRANCH}"
          git push -f "https://gitee.com/${REPO}.git" "${GITEE_PAGES_BRANCH}"
